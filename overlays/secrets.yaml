# Overlay: supply caliban's credentials via docker secrets (files) instead of
# environment variables in .env. Hardened counterpart to the .env default.
#
#   Setup:
#     printf '%s' 'sk-ant-...' > secrets/anthropic_api_key   # no trailing newline
#     chmod 600 secrets/anthropic_api_key
#     docker compose -f compose.yaml -f overlays/secrets.yaml up -d
#
# Each file under secrets/ is mounted at /run/secrets/<name>. caliban has no
# native *_FILE convention, so a tiny entrypoint wrapper exports every mounted
# secret as its UPPERCASED name (anthropic_api_key → ANTHROPIC_API_KEY) and then
# execs caliband with the unchanged command args. Composes with any other overlay
# that sets caliban's `command:`.

services:
  caliban:
    entrypoint:
      - /bin/sh
      - -c
      - 'for f in /run/secrets/*; do [ -f "$$f" ] && export "$$(basename "$$f" | tr a-z A-Z)=$$(cat "$$f")"; done; exec caliband "$$@"'
      - --
    secrets:
      - anthropic_api_key

secrets:
  anthropic_api_key:
    file: ./secrets/anthropic_api_key
